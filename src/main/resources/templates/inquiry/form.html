<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 작성 - EVCar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/common/common.css}">
<link rel="stylesheet" th:href="@{/css/mypage/mypageSidebar.css}">
<link rel="stylesheet" th:href="@{/css/inquiry/form.css}">
</head>

<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="ev-inquiry-form-page">
    <section class="ev-inquiry-form-section">
        <div class="ev-inquiry-form-container">

            <div th:replace="~{mypage/sidebar :: sidebar('inquiry')}"></div>

            <div class="ev-inquiry-form-content">
                <div class="ev-inquiry-form-header">
                    <p class="ev-inquiry-form-eyebrow">Customer Center</p>
                    <h1 class="ev-inquiry-form-title">문의 글쓰기</h1>
                    <p class="ev-inquiry-form-description">
                        궁금한 내용을 남겨주시면 확인 후 답변드리겠습니다.
                    </p>
                </div>

                <div class="alert alert-danger ev-inquiry-form-alert"
                     th:if="${errorMessage != null}"
                     th:text="${errorMessage}">
                </div>

                <form class="ev-inquiry-form"
                      th:action="@{/inquiry/form}"
                      th:object="${inquiryCreateRequestDto}"
                      method="post"
                      id="inquiryCreateForm">

                    <div class="ev-inquiry-form-group">
                        <label for="writer" class="ev-inquiry-form-label">작성자</label>
                        <input type="text"
                               id="writer"
                               class="ev-input ev-inquiry-form-input"
                               th:value="${currentUserId}"
                               readonly>
                        <p class="ev-inquiry-form-help">로그인 회원 아이디가 자동 표시됩니다.</p>
                    </div>

                    <div class="ev-inquiry-form-group">
                        <label for="title" class="ev-inquiry-form-label">제목 <span class="ev-required">*</span></label>
                        <input type="text"
                               id="title"
                               class="ev-input ev-inquiry-form-input"
                               th:field="*{title}"
                               maxlength="200"
                               placeholder="제목을 입력해주세요.">
                    </div>

                    <div class="ev-inquiry-form-group">
                        <label for="content" class="ev-inquiry-form-label">내용 <span class="ev-required">*</span></label>
                        <textarea id="content"
                                  class="ev-input ev-inquiry-form-textarea"
                                  th:field="*{content}"
                                  rows="10"
                                  placeholder="문의 내용을 입력해주세요."></textarea>
                    </div>

                    <div class="ev-inquiry-form-group">
                        <label for="password" class="ev-inquiry-form-label">비밀번호 <span class="ev-required">*</span></label>
                        <input type="password"
                               id="password"
                               class="ev-input ev-inquiry-form-input"
                               th:field="*{password}"
                               maxlength="255"
                               placeholder="본인 로그인 비밀번호를 입력해주세요.">
                        <p class="ev-inquiry-form-help">본인 확인용이며 DB에는 저장되지 않습니다.</p>
                    </div>

                    <div class="ev-inquiry-form-actions">
                        <button type="submit" class="btn btn-ev-primary">문의하기</button>
                        <a class="btn btn-ev-secondary" th:href="@{/mypage/inquiry}">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<div th:replace="~{fragments/chatbotWidget :: chatbot}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common/footer.js}"></script>
<script th:src="@{/js/inquiry/form.js}"></script>

</body>
</html>
