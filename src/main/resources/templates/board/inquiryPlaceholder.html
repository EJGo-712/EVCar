<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의게시판 - EVCar</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container py-5" style="min-height: 70vh; margin-top: 100px;">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-5 text-center">
                        <h1 class="mb-3">문의게시판</h1>
                        <p class="text-secondary mb-4">
                            해당 기능은 현재 준비중입니다.<br>
                            추후 문의게시판과 연동될 예정입니다.
                        </p>

                        <div class="d-flex justify-content-center gap-2 flex-wrap">
                            <a th:href="@{/mypage/inquiry}" class="btn btn-outline-secondary">
                                문의 내역으로 돌아가기
                            </a>
                            <a th:href="@{/mypage}" class="btn btn-primary">
                                마이페이지로 이동
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
