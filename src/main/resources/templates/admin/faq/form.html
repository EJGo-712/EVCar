<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'FAQ 수정 | EVCar Admin' : 'FAQ 등록 | EVCar Admin'">FAQ 등록 | EVCar Admin</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-faq.css}">
</head>
<body>
<div class="ev-admin-layout">
    <div th:replace="~{layout/adminSidebar :: adminSidebar('faq')}"></div>

    <main class="ev-admin-content ev-admin-faq-form-page">
        <section class="ev-admin-faq-form-section">
            <div class="ev-admin-faq-form-header">
                <p class="ev-admin-faq-form-eyebrow">Admin FAQ</p>
                <h1 class="ev-admin-faq-form-title"
                    th:text="${isEdit} ? 'FAQ 수정' : 'FAQ 등록'">
                    FAQ 등록
                </h1>
                <p class="ev-admin-faq-form-desc">질문과 답변을 입력해 FAQ를 관리하세요.</p>
            </div>

            <div class="ev-card ev-admin-faq-form-card">
                <div class="ev-card-body">
                    <form th:action="@{/admin/faq/form}" method="post" id="adminFaqForm">
                        <input type="hidden" name="faqId" th:value="${faqForm.faqId}">

                        <div class="ev-admin-faq-form-group" th:if="${isEdit}">
                            <label class="ev-admin-faq-form-label">FAQ ID</label>
                            <input type="text"
                                   class="ev-input"
                                   th:value="${faqForm.faqId}"
                                   readonly>
                        </div>

                        <div class="ev-admin-faq-form-group">
                            <label for="question" class="ev-admin-faq-form-label">질문</label>
                            <input type="text"
                                   id="question"
                                   name="question"
                                   class="ev-input"
                                   maxlength="200"
                                   placeholder="질문을 입력하세요."
                                   th:value="${faqForm.question}"
                                   required>
                        </div>

                        <div class="ev-admin-faq-form-group">
                            <label for="answer" class="ev-admin-faq-form-label">답변</label>
                            <textarea id="answer"
                                      name="answer"
                                      class="ev-input ev-admin-faq-textarea"
                                      placeholder="답변을 입력하세요."
                                      required
                                      th:text="${faqForm.answer}"></textarea>
                        </div>

                        <div class="ev-admin-faq-form-meta" th:if="${isEdit}">
                            <div class="ev-admin-faq-form-meta-item">
                                <span>등록일</span>
                                <strong th:text="${faqForm.createdAt}">2026-03-31</strong>
                            </div>
                            <div class="ev-admin-faq-form-meta-item">
                                <span>수정일</span>
                                <strong th:text="${faqForm.updatedAt != null ? faqForm.updatedAt : '-'}">2026-03-31</strong>
                            </div>
                        </div>

                        <div class="ev-admin-faq-form-actions">
                            <a class="btn btn-ev-secondary ev-admin-faq-form-btn" th:href="@{/admin/faq(page=1)}">
                                목록으로
                            </a>
                            <button type="submit" class="btn btn-ev-primary ev-admin-faq-form-btn">
                                저장하기
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/admin-faq.js}"></script>
</body>
</html>
