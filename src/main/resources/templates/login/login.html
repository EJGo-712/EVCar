<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<!-- CSS -->
<link rel="stylesheet" th:href="@{/css/user/login.css}" />

</head>

<body>

<div class="container">

    <div class="title">로그인</div>

    <form th:action="@{/login}" method="post">

        <!-- 아이디 -->
        <div class="form-group">
            <input type="text" name="loginId" placeholder="아이디" required />
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
           <input type="password" name="password" placeholder="비밀번호" required />
        </div>

        <!-- 버튼 -->
        <button type="submit" class="login-btn">로그인</button>

    </form>

    <!-- 링크 -->
    <div class="link-area">
        <a href="/login/find-id">아이디 찾기</a> /
        <a href="/login/find-id">비밀번호 변경</a> /
        <a href="/signup/term">회원가입</a>
    </div>

    <!-- 로그인 실패 메시지 -->
    <div class="error-box" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
    </div>

</div>

</body>
</html>
