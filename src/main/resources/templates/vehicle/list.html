<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>전기차 조회</title>

<style>
.filter-section {
    border: 1px solid #ddd;
    padding: 10px 20px;
}

.filter-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

.filter-label {
    width: 60px;
    font-weight: bold;
    color: #333;
    font-size: 14px;
}

.filter-btn {
    display: inline-block;
    border: none;
    background: none;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    color: #555;
    border-radius: 4px;
    margin-right: 4px;
    text-decoration: none;
}

.filter-btn.active {
    background-color: #003087;
    color: white;
    font-weight: bold;
}

/* 카드 목록 */
.vehicle-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px 0;
}

/* 카드 하나 */
.vehicle-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
}

/* 이미지 영역 */
.vehicle-image {
    height: 200px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
}

.vehicle-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* 정보 */
.vehicle-info {
    padding: 12px;
}

.vehicle-name {
    font-weight: bold;
    font-size: 15px;
    margin: 0 0 4px 0;
}

.vehicle-price {
    color: #666;
    font-size: 13px;
    margin: 0;
}
</style>
</head>

<body>

<!-- 🔥 필터 영역 -->
<div class="filter-section">

    <!-- 브랜드 -->
    <div class="filter-row">
        <span class="filter-label">브랜드</span>
        <div>

            <a th:href="@{/vehicle/list(brand='전체', vehicleClass=${selectedClass})}"
               th:classappend="${selectedBrand == '전체'} ? 'active'"
               class="filter-btn">전체</a>

            <a th:href="@{/vehicle/list(brand='현대', vehicleClass=${selectedClass})}"
               th:classappend="${selectedBrand == '현대'} ? 'active'"
               class="filter-btn">현대</a>

            <a th:href="@{/vehicle/list(brand='기아', vehicleClass=${selectedClass})}"
               th:classappend="${selectedBrand == '기아'} ? 'active'"
               class="filter-btn">기아</a>

        </div>
    </div>

    <!-- 차급 -->
    <div class="filter-row">
        <span class="filter-label">차급</span>
        <div>

            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='전체')}"
               th:classappend="${selectedClass == '전체'} ? 'active'"
               class="filter-btn">전체</a>
               
               <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='경형')}"
               th:classappend="${selectedClass == '경형'} ? 'active'"
               class="filter-btn">경형</a>
			
            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='경형SUV')}"
               th:classappend="${selectedClass == '경형SUV'} ? 'active'"
               class="filter-btn">경형SUV</a>

            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='소형SUV')}"
               th:classappend="${selectedClass == '소형SUV'} ? 'active'"
               class="filter-btn">소형SUV</a>

            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='중형SUV')}"
               th:classappend="${selectedClass == '중형SUV'} ? 'active'"
               class="filter-btn">중형SUV</a>

            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='대형SUV')}"
               th:classappend="${selectedClass == '대형SUV'} ? 'active'"
               class="filter-btn">대형SUV</a>
               
             <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='세단')}"
                th:classappend="${selectedClass == '세단'} ? 'active'"
                class="filter-btn">세단</a>
             
               
            <a th:href="@{/vehicle/list(brand=${selectedBrand}, vehicleClass='고성능')}"
               th:classappend="${selectedClass == '고성능'} ? 'active'"
               class="filter-btn">고성능</a>
               

        </div>
    </div>

</div>

<div class="vehicle-list">

    <!-- 데이터 있을 때 -->
    <div th:if="${vehicleList != null and !vehicleList.isEmpty()}"
         th:each="vehicle : ${vehicleList}"
         class="vehicle-card">

        <div class="vehicle-image">
    <img th:src="@{/images/ioniq5_01.png}">
</div>

        <div class="vehicle-info">
            <p class="vehicle-name" th:text="${vehicle.modelName}"></p>
            <p class="vehicle-price" th:text="${vehicle.price} + '만원'"></p>
        </div>

    </div>

    <!-- 데이터 없을 때 (🔥 div 제거하고 바로 카드) -->
    <th:block th:if="${vehicleList == null or vehicleList.isEmpty()}">

        <div class="vehicle-card">
            <div class="vehicle-image">
            <img th:src="@{/images/ioniq5_01.png}">
            </div>
            <div class="vehicle-info">
                <p class="vehicle-name">아이오닉 5</p>
                <p class="vehicle-price">5,200 ~ 6,200만원</p>
            </div>
        </div>

        <div class="vehicle-card">
            <div class="vehicle-image">차량 이미지</div>
            <div class="vehicle-info">
                <p class="vehicle-name">모델명</p>
                <p class="vehicle-price">가격</p>
            </div>
        </div>

        <div class="vehicle-card">
            <div class="vehicle-image">차량 이미지</div>
            <div class="vehicle-info">
                <p class="vehicle-name">모델명</p>
                <p class="vehicle-price">가격</p>
            </div>
        </div>

    </th:block>

</div>

</body>
</html>
