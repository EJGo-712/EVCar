<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>차량 상세</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

/* 헤더 */
.ev-header {
	background: #1f2a44;
	height: 70px;
	display: flex;
	align-items: center;
	color: white;
	position: fixed;
	top: 0;
	width: 100%;
}

.ev-header-inner {
	width: 1200px;
	margin: 0 auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.ev-header a {
	color: white;
	text-decoration: none;
}

body {
	padding-top: 80px;
}

/* 🔥 전체 폭 */
.detail-wrap {
	max-width: 1300px;
	margin: 60px auto;
}

/*  핵심: 16:9 비율 * /
.car-image {
	width: 100%;
	aspect-ratio: 16 / 9; 
	background: #eee;
	overflow: hidden;
	border-radius: 12px;
}

/*  핵심: 가운데 꽉 차게 */
.slide-img {
	width: 100%;
	height: 100%;
	object-fit: cover; /*  contain → cover */
	object-position: center;
}

/* 왼쪽 넓힘 */
.col-md-8 {
	padding-right: 20px;
}

/* 오른쪽 */
.detail-info {
	padding-left: 40px;
	position: relative;
}

/* 제목 */
.title-row {
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.title {
	font-size: 2.5rem;
	font-weight: 700;
}

/* 하트 */
.wishlist {
	font-size: 26px;
	cursor: pointer;
}

/* 서브 */
.sub-info {
	font-size: 0.9rem;
	color: #6B7280;
	margin-top: 6px;
}

/* 스펙 */
.spec-box {
	margin-top: 30px;
	border-top: 1px solid #ddd;
	padding-top: 20px;
}

.spec-row {
	display: flex;
	justify-content: space-between;
	padding: 10px 0;
	border-bottom: 1px solid #eee;
}

/* 버튼 */
.catalog-btn {
	position: absolute;
	bottom: 0;
	right: 0;
	padding: 10px 20px;
	border-radius: 6px;
	background: #212529;
	color: white;
	text-decoration: none;
}

</style>
</head>

<body>

<!-- 헤더 -->
<div class="ev-header">
	<div class="ev-header-inner">
		<div>EV<br>Consulting</div>

		<div style="display: flex; gap: 30px;">
			<a href="/">회사소개</a>
			<a href="/vehicle/list">전기차조회</a>
			<a href="/charging/map">충전소지도</a>
			<a href="/faq">고객센터</a>
		</div>

		<div>
			<a href="/login">로그인</a>
		</div>
	</div>
</div>

<div class="detail-wrap">

	<div class="row">

		<!-- 🔥 이미지 -->
		<div class="col-md-8">
			<div id="carCarousel" class="carousel slide" data-bs-ride="carousel">

				<div class="carousel-inner car-image">

					<div class="carousel-item active">
						<img th:src="@{/images/ev_ioniq_ioniq5.png}" class="slide-img">
					</div>

					<div class="carousel-item">
						<img th:src="@{/images/ev_ioniq_ioniq5_2.png}" class="slide-img">
					</div>

					<div class="carousel-item">
						<img th:src="@{/images/ev_ioniq_ioniq5_3.png}" class="slide-img">
					</div>

				</div>

				<button class="carousel-control-prev" type="button"
					data-bs-target="#carCarousel" data-bs-slide="prev">
					<span class="carousel-control-prev-icon"></span>
				</button>

				<button class="carousel-control-next" type="button"
					data-bs-target="#carCarousel" data-bs-slide="next">
					<span class="carousel-control-next-icon"></span>
				</button>

			</div>
		</div>

		<!-- 정보 -->
		<div class="col-md-4 detail-info">

			<div class="title-row">
				<div class="title" th:text="${vehicle.modelName}"></div>

				<div class="wishlist" id="wishlistBtn"
					th:data-id="${vehicle.vehicleId}">
					<span th:if="${vehicle.wished}">❤️</span>
					<span th:unless="${vehicle.wished}">🤍</span>
				</div>
			</div>

			<div class="sub-info">
				<span th:text="${vehicle.brand}"></span> |
				<span th:text="${vehicle.vehicleClass}"></span>
			</div>

			<div class="spec-box">

				<div class="spec-row">
					<span>가격</span>
					<strong th:text="${vehicle.priceBasic} + '만원'"></strong>
				</div>

				<div class="spec-row">
					<span>주행거리</span>
					<strong th:text="${vehicle.drivingRange} + 'km'"></strong>
				</div>

				<div class="spec-row">
					<span>충전시간</span>
					<strong th:text="${vehicle.fastChargingTime}"></strong>
				</div>

				<div class="spec-row">
					<span>충전방식</span>
					<strong th:text="${vehicle.chargingMethod}"></strong>
				</div>

				<div class="spec-row">
					<span>배터리</span>
					<strong th:text="${vehicle.batteryCapacity} + ' kWh'"></strong>
				</div>

			</div>

			<a th:href="@{${vehicle.catalogUrl}}" target="_blank"
				class="catalog-btn">
				카탈로그 보기
			</a>

		</div>
	</div>

	<div class="mt-4">
		<a href="/vehicle/list" class="btn btn-secondary">목록으로</a>
	</div>

</div>

<script>
$("#wishlistBtn").click(function() {

	let vehicleId = $(this).data("id");
	let isWished = $(this).text().trim() === "❤️";

	let url = isWished ? "/wishlist/delete" : "/wishlist/add";

	$.post(url, { vehicleId : vehicleId }, function() {
		$("#wishlistBtn").text(isWished ? "🤍" : "❤️");
	});
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
